        url: https://www.litify.com/

  - name: Litify Docrio API
    description: Provides access to Litify's Docrio document management layer, enabling integrators to create, retrieve, and manage documents and folders associated with legal matters. Documents uploaded via integrations are stored in Docrio and linked to matter records.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.litify.com/blog/docs-made-delightful
