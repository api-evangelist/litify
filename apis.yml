apis:

  - name: Litify Salesforce REST API
    description: Provides access to the Litify legal operating system via the Salesforce REST API. Supports managing matters, intakes, documents, tasks, time tracking, billing, and client communications for law firms. Authentication uses an approved integrator key token provided by Litify alongside Salesforce OAuth 2.0.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.litify.com/platform
    baseURL: https://login.salesforce.com
    tags:
